version: "3.8"

services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: plt
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: plt_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plt"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
    security_opt:
      - no-new-privileges:true
    networks:
      - plt-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    networks:
      - plt-network

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    restart: unless-stopped
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    networks:
      - plt-network

  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://plt:${DB_PASSWORD}@postgres:5432/plt_db
      DATABASE_URL_SYNC: postgresql://plt:${DB_PASSWORD}@postgres:5432/plt_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      S3_ENDPOINT: http://minio:9000
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "1"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only_rootfs: true
    tmpfs:
      - /tmp
      - /var/tmp
    networks:
      - plt-network

  celery_worker:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://plt:${DB_PASSWORD}@postgres:5432/plt_db
      DATABASE_URL_SYNC: postgresql://plt:${DB_PASSWORD}@postgres:5432/plt_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      S3_ENDPOINT: http://minio:9000
      ENVIRONMENT: production
    command: celery -A src.core.celery_app worker -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "1"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only_rootfs: true
    tmpfs:
      - /tmp
      - /var/tmp
    networks:
      - plt-network

  celery_beat:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://plt:${DB_PASSWORD}@postgres:5432/plt_db
      DATABASE_URL_SYNC: postgresql://plt:${DB_PASSWORD}@postgres:5432/plt_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      S3_ENDPOINT: http://minio:9000
      ENVIRONMENT: production
    command: celery -A src.core.celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    read_only_rootfs: true
    tmpfs:
      - /tmp
      - /var/tmp
    networks:
      - plt-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  plt-network:
    driver: bridge

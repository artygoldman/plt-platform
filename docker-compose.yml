version: "3.8"

services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: plt-postgres
    env_file: .env
    environment:
      POSTGRES_USER: plt
      POSTGRES_PASSWORD: plt_dev_2026
      POSTGRES_DB: plt_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plt"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plt-network

  redis:
    image: redis:7-alpine
    container_name: plt-redis
    env_file: .env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plt-network

  minio:
    image: minio/minio:latest
    container_name: plt-minio
    env_file: .env
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plt-network

  api:
    build: .
    container_name: plt-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://plt:plt_dev_2026@postgres:5432/plt_db
      DATABASE_URL_SYNC: postgresql://plt:plt_dev_2026@postgres:5432/plt_db
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    networks:
      - plt-network

  celery_worker:
    build: .
    container_name: plt-celery-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://plt:plt_dev_2026@postgres:5432/plt_db
      DATABASE_URL_SYNC: postgresql://plt:plt_dev_2026@postgres:5432/plt_db
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    command: celery -A src.core.celery_app worker -l info
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - plt-network

  celery_beat:
    build: .
    container_name: plt-celery-beat
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://plt:plt_dev_2026@postgres:5432/plt_db
      DATABASE_URL_SYNC: postgresql://plt:plt_dev_2026@postgres:5432/plt_db
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    command: celery -A src.core.celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - plt-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  plt-network:
    driver: bridge
